services:
  redis:
    image: redis:7-alpine
    container_name: casecellshop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: casecellshop-postgres
    environment:
      POSTGRES_USER: cellshop
      POSTGRES_PASSWORD: cellshop
      POSTGRES_DB: cellshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cellshop"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
